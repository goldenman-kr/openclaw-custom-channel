name: openclaw_custom_channel_client
description: Flutter mobile chat client for the OpenClaw custom channel bridge.
publish_to: "none"

version: 0.1.0+1

environment:
  sdk: ^3.11.0
  flutter: ">=3.41.0"

dependencies:
  file_picker: ^11.0.2
  flutter:
    sdk: flutter
  geolocator: ^14.0.2
  http: ^1.2.2
  image_picker: ^1.2.1
  mime: ^2.0.0
  path: ^1.9.1
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
